<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>stormedge — desk</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:           #07080a;
    --bg-2:         #0a0c10;
    --panel:        #0d0f13;
    --panel-2:      #11141a;
    --panel-3:      #161a22;
    --line:         rgba(255,255,255,0.07);
    --line-2:       rgba(255,255,255,0.04);
    --line-3:       rgba(255,255,255,0.12);
    --text:         #e9e6df;
    --text-soft:    #b4b0a6;
    --muted:        #767065;
    --dim:          #4a4640;
    --signal:       #f5b13c;
    --signal-soft:  rgba(245,177,60,0.15);
    --positive:     #6cbf85;
    --pos-soft:     rgba(108,191,133,0.14);
    --negative:     #e07866;
    --neg-soft:     rgba(224,120,102,0.14);
    --warn:         #f0934f;
    --yes:          #6cbf85;
    --no:           #e07866;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Manrope', ui-sans-serif, sans-serif; -webkit-font-smoothing: antialiased; -webkit-text-size-adjust: 100%; }
  /* The page itself never scrolls sideways — wide content pans inside its card */
  body { overflow-x: hidden; }
  body {
    background:
      radial-gradient(ellipse 80% 50% at 12% -10%, rgba(245,177,60,0.05), transparent 60%),
      radial-gradient(ellipse 60% 40% at 110% 0%, rgba(108,191,133,0.025), transparent 60%),
      var(--bg);
    min-height: 100vh;
  }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; letter-spacing: -0.005em; }
  .pos { color: var(--positive); }
  .neg { color: var(--negative); }
  .dim { color: var(--muted); }
  .small { font-size: 11px; }
  .lg   { font-size: 18px; }
  .sep  { color: var(--dim); margin: 0 6px; }
  .trunc {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .app {
    max-width: 1640px;
    margin: 0 auto;
    padding: 20px 24px 40px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ============ TOPBAR ============ */
  .topbar {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 32px;
    padding: 4px 4px 12px;
    border-bottom: 1px solid var(--line);
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-mark {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 1.5px solid var(--text);
    position: relative;
    flex-shrink: 0;
  }
  .brand-mark::before {
    content: '';
    position: absolute;
    inset: -1.5px;
    border-radius: 50%;
    background: linear-gradient(124deg, transparent 47%, var(--text) 47%, var(--text) 53%, transparent 53%);
    -webkit-mask: radial-gradient(circle, #000 60%, transparent 61%);
            mask: radial-gradient(circle, #000 60%, transparent 61%);
  }
  .brand-word {
    font-family: 'Instrument Serif', serif;
    font-size: 22px;
    line-height: 1;
    letter-spacing: 0.3px;
  }
  .brand-word em { color: var(--signal); font-style: italic; }
  .brand-tag {
    font-size: 10.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 3px 8px;
    border: 1px solid var(--line);
    border-radius: 999px;
    margin-left: 4px;
  }

  .top-nav {
    display: flex;
    gap: 4px;
    justify-self: start;
    margin-left: 16px;
  }
  .nav-item {
    padding: 7px 12px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 500;
    border-radius: 6px;
    cursor: pointer;
    transition: color .15s, background .15s;
  }
  .nav-item:hover { color: var(--text-soft); }
  .nav-item.active {
    color: var(--text);
    background: var(--panel-2);
    box-shadow: inset 0 0 0 1px var(--line);
  }

  .top-right { display: flex; align-items: center; gap: 14px; }

  .mode-pill {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 5px 10px;
    border-radius: 999px;
    font-size: 11px;
    letter-spacing: 0.14em;
    font-weight: 700;
  }
  .mode-pill .mode-dot {
    width: 7px; height: 7px; border-radius: 50%;
  }
  .mode-paper {
    color: var(--signal);
    background: var(--signal-soft);
    box-shadow: inset 0 0 0 1px rgba(245,177,60,0.25);
  }
  .mode-paper .mode-dot { background: var(--signal); box-shadow: 0 0 8px var(--signal); }
  .mode-live {
    color: var(--positive);
    background: var(--pos-soft);
    box-shadow: inset 0 0 0 1px rgba(108,191,133,0.3);
  }
  .mode-live .mode-dot { background: var(--positive); box-shadow: 0 0 8px var(--positive); }
  .mode-toggleable { cursor: pointer; user-select: none; }
  .mode-toggleable:hover { filter: brightness(1.25); }
  /* Frozen paper-era snapshot view: amber like paper, but dashed = "exhibit". */
  .mode-archive {
    color: var(--signal);
    background: var(--signal-soft);
    box-shadow: none;
    border: 1px dashed rgba(245,177,60,0.55);
  }
  .mode-archive .mode-dot { background: var(--signal); opacity: 0.5; box-shadow: none; }
  .archive-banner {
    margin: 10px 18px 0;
    padding: 8px 14px;
    border: 1px dashed rgba(245,177,60,0.5);
    border-radius: 8px;
    background: var(--signal-soft);
    color: var(--signal);
    font-size: 12px;
    letter-spacing: 0.08em;
    text-align: center;
  }

  .last-scan {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 12px;
    color: var(--text-soft);
  }
  .last-scan .dim { font-size: 10.5px; letter-spacing: 0.06em; text-transform: uppercase; }
  .scan-pulse {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--positive);
    box-shadow: 0 0 6px var(--positive);
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: .4; transform: scale(.85); } 50% { opacity: 1; transform: scale(1); } }

  .user-avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--panel-3);
    color: var(--text);
    display: grid; place-items: center;
    font-size: 11.5px;
    font-weight: 600;
    border: 1px solid var(--line);
    cursor: pointer;
    text-decoration: none;
  }
  .user-avatar:hover { border-color: var(--line-3); }

  /* ============ HEADER STRIP ============ */
  .header-strip {
    display: grid;
    grid-template-columns: 1.2fr 1fr 1fr 1.4fr;
    gap: 12px;
  }
  .kpi {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 16px 18px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-height: 96px;
    position: relative;
    overflow: hidden;
  }
  .kpi-hero {
    background: linear-gradient(180deg, #14171d 0%, var(--panel) 90%);
    border-color: rgba(245,177,60,0.18);
  }
  .kpi-hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 50% at 0% 0%, rgba(245,177,60,0.07), transparent 70%);
    pointer-events: none;
  }
  .kpi-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
  }
  .kpi-value {
    font-size: 24px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.1;
    letter-spacing: -0.01em;
  }
  .kpi-sub { font-size: 12px; color: var(--text-soft); }

  .circuit { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
  .circuit-bar {
    height: 6px;
    background: var(--panel-3);
    border-radius: 3px;
    position: relative;
    overflow: hidden;
  }
  .circuit-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--warn), var(--negative));
    border-radius: 3px;
    transition: width .3s;
  }
  .circuit-tick {
    position: absolute;
    top: 0; bottom: 0;
    width: 1px;
    background: rgba(0,0,0,0.5);
  }
  .circuit-meta {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-soft);
  }
  .circuit-tripped {
    font-size: 10.5px;
    letter-spacing: 0.16em;
    color: var(--negative);
    font-weight: 700;
  }

  /* ============ CARD ============ */
  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 16px 18px 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .circuit-banner {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 0 0 12px;
    padding: 10px 16px;
    background: rgba(220, 60, 60, 0.12);
    border: 1px solid rgba(220, 60, 60, 0.4);
    border-radius: 8px;
    color: #e87070;
    font-size: 13px;
    font-weight: 500;
  }
  .circuit-banner-icon { font-size: 15px; flex-shrink: 0; }

  .card-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }
  .card-head.clickable { cursor: pointer; }
  .card-head h2 {
    margin: 0;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.005em;
    color: var(--text);
  }
  .card-head .card-sub {
    margin: 4px 0 0;
    font-size: 12px;
    color: var(--muted);
  }
  .pill {
    font-size: 10.5px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 8px;
    border-radius: 999px;
    background: var(--panel-2);
    color: var(--text-soft);
    border: 1px solid var(--line);
    white-space: nowrap;
  }
  .pill.subtle { color: var(--muted); }

  /* ============ MAIN ROW (globe + side) ============ */
  .row-main {
    display: grid;
    grid-template-columns: 1.25fr 1fr;
    gap: 12px;
    align-items: start;   /* don't stretch the globe to match a long positions list */
  }
  .col-stack { display: flex; flex-direction: column; gap: 12px; }

  /* ============ PAGINATION ============ */
  .pagination {
    display: inline-flex; align-items: center; gap: 6px;
  }
  .pg-btn {
    background: var(--panel-2);
    border: 1px solid var(--line);
    color: var(--text-soft);
    font: inherit;
    font-size: 14px;
    width: 24px; height: 24px;
    border-radius: 4px;
    cursor: pointer;
    display: grid; place-items: center;
    line-height: 1;
    transition: background .1s, color .1s;
  }
  .pg-btn:hover:not(:disabled) { background: var(--panel-3); color: var(--text); }
  .pg-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .pg-info { font-size: 11px; color: var(--muted); min-width: 36px; text-align: center; }

  /* ============ GLOBE ============ */
  /* Fixed height (not min-height) so the canvas stays stable no matter how long
     the neighbouring positions list grows — otherwise the globe balloons into a void. */
  .globe-card { height: 560px; }
  .globe-legend {
    display: flex;
    gap: 14px;
    font-size: 11px;
    color: var(--text-soft);
  }
  .globe-legend .lg {
    display: inline-flex; align-items: center; gap: 6px;
  }
  .globe-legend .lg i {
    width: 7px; height: 7px; border-radius: 50%;
  }
  .globe-legend .lg-active i { background: var(--positive); box-shadow: 0 0 6px var(--positive); }
  .globe-legend .lg-signal i { background: var(--signal); box-shadow: 0 0 6px var(--signal); }
  .globe-legend .lg-scanned i { background: rgba(245,177,60,0.5); }

  .globe-body {
    display: grid;
    grid-template-columns: 1fr 240px;
    gap: 12px;
    flex: 1;
    min-height: 0;
  }
  .globe-canvas {
    position: relative;
    border-radius: 6px;
    background: radial-gradient(ellipse at 50% 50%, #0a0c10 0%, #06070a 80%);
    overflow: hidden;
    border: 1px solid var(--line-2);
    user-select: none;
    touch-action: none;
    height: 100%;
    min-height: 0;
    width: 100%;
  }
  .globe-tip {
    position: absolute;
    z-index: 5;
    background: rgba(20,22,28,0.96);
    backdrop-filter: blur(8px);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 9px 11px;
    font-size: 12px;
    pointer-events: none;
    min-width: 160px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  }
  .tip-name { color: var(--text); font-weight: 600; }
  .tip-coords { font-size: 10.5px; color: var(--muted); margin-top: 2px; }
  .tip-row { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-soft); margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--line-2); }
  .tip-row .dot { width: 6px; height: 6px; border-radius: 50%; }
  .tip-row .dot.pos { background: var(--positive); }
  .tip-row .dot.sig { background: var(--signal); }
  .tip-row .dot.sc  { background: rgba(245,177,60,0.5); }

  .globe-side {
    display: flex;
    flex-direction: column;
    min-height: 0;
    background: rgba(255,255,255,0.012);
    border: 1px solid var(--line-2);
    border-radius: 6px;
    padding: 12px 4px 8px 12px;
  }
  .side-head {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 0 8px 8px 0;
    border-bottom: 1px solid var(--line-2);
  }
  .side-title {
    font-size: 10.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
  }
  .side-count { font-size: 14px; color: var(--text); font-weight: 600; }
  .city-list {
    list-style: none;
    padding: 6px 4px 6px 0;
    margin: 0;
    overflow-y: auto;
    flex: 1;
    min-height: 0;
    display: flex; flex-direction: column;
    gap: 1px;
  }
  .city-list::-webkit-scrollbar { width: 6px; }
  .city-list::-webkit-scrollbar-track { background: transparent; }
  .city-list::-webkit-scrollbar-thumb { background: var(--line-3); border-radius: 3px; }
  .city-row {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 8px;
    padding: 7px 8px;
    border-radius: 4px;
    font-size: 12.5px;
    color: var(--text-soft);
    cursor: pointer;
  }
  .city-row:hover { background: var(--panel-2); }
  .city-row.sel { background: rgba(245,177,60,0.06); }
  .state-dot {
    width: 7px; height: 7px; border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-active { background: var(--positive); box-shadow: 0 0 6px var(--positive); }
  .dot-signal { background: var(--signal); box-shadow: 0 0 4px var(--signal); }
  .dot-scanned { background: rgba(245,177,60,0.5); }
  .city-name { color: var(--text); font-weight: 500; }
  .city-meta {
    display: inline-flex; gap: 6px; align-items: center;
    font-size: 11px;
  }
  .side-foot {
    padding: 10px 8px 4px 0;
    display: flex; justify-content: space-between;
    border-top: 1px solid var(--line-2);
    font-size: 10.5px;
    letter-spacing: 0.04em;
  }

  /* ============ TABLE ============ */
  .table { display: flex; flex-direction: column; }
  .thead {
    display: grid;
    gap: 12px;
    align-items: center;
    padding: 8px 4px;
    border-bottom: 1px solid var(--line);
    font-size: 10.5px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
  }
  .thead .r, .trow .r { text-align: right; }
  .trow {
    display: grid;
    gap: 12px;
    align-items: center;
    padding: 10px 4px;
    border-bottom: 1px solid var(--line-2);
    font-size: 13px;
  }
  .trow:last-child { border-bottom: 0; }
  .trow:hover { background: rgba(255,255,255,0.012); }

  .positions-table .thead,
  .positions-table .trow {
    grid-template-columns: 2.4fr 0.9fr 0.7fr 0.7fr 0.8fr 1fr 0.7fr;
  }
  .positions-card {
    height: 560px;
    box-sizing: border-box;
  }
  .positions-table {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .positions-scroll-wrapper {
    flex: 1;
    overflow-y: auto;
    min-height: 0;
    padding-right: 4px;
  }
  .positions-scroll-wrapper::-webkit-scrollbar {
    width: 6px;
  }
  .positions-scroll-wrapper::-webkit-scrollbar-track {
    background: transparent;
  }
  .positions-scroll-wrapper::-webkit-scrollbar-thumb {
    background: var(--line-2);
    border-radius: 3px;
  }
  .positions-scroll-wrapper::-webkit-scrollbar-thumb:hover {
    background: var(--line);
  }
  .cell-city .city-line { color: var(--text); font-weight: 600; font-size: 13px; }
  .cell-city .city-q { font-size: 11.5px; color: var(--muted); margin-top: 2px; }
  .side-tag {
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 2px 6px;
    border-radius: 3px;
    display: inline-block;
    line-height: 1.4;
  }
  .side-yes { background: var(--pos-soft); color: var(--yes); }
  .side-no  { background: var(--neg-soft); color: var(--no);  }

  .trades-table .thead,
  .trades-table .trow {
    grid-template-columns: 2.1fr 0.5fr 1.1fr 0.7fr 0.9fr 1.5fr 0.55fr 0.55fr;
  }
  .trades-table .arrow { color: var(--dim); margin: 0 5px; font-size: 11px; }
  .reason {
    font-size: 11.5px;
    color: var(--text-soft);
  }
  .reason-stop  { color: var(--negative); }
  .reason-decay { color: var(--warn); }
  .reason-resyes { color: var(--positive); }
  .reason-resno  { color: var(--text-soft); }

  /* ============ EQUITY ============ */
  .equity-stat { text-align: right; line-height: 1.1; }
  .equity-chart { padding: 0 2px; }

  /* ============ PERF GRID ============ */
  .perf-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 12px;
  }
  .perf-tile {
    background: var(--panel-2);
    border: 1px solid var(--line-2);
    border-radius: 6px;
    padding: 14px 16px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .perf-val { font-size: 20px; font-weight: 600; color: var(--text); letter-spacing: -0.01em; }
  .perf-val.pos { color: var(--positive); }
  .perf-val.neg { color: var(--negative); }

  .period-tabs {
    display: flex;
    gap: 4px;
    align-self: center;
    flex-shrink: 0;
  }
  .period-tab {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.04em;
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .period-tab:hover {
    background: var(--panel-2);
    color: var(--text-soft);
  }
  .period-tab.active {
    background: var(--signal);
    border-color: var(--signal);
    color: #0a0a0a;
  }

  /* ============ BOTTOM ROW ============ */
  .row-bottom {
    display: grid;
    grid-template-columns: 1.7fr 1fr;
    gap: 12px;
  }

  /* ============ MODEL ACCURACY ============ */
  .region-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 2px 6px;
    border-radius: 3px;
    background: var(--panel-3);
    color: var(--text-soft);
  }
  .text-signal { color: var(--signal) !important; }

  /* recently scanned signals */
  .signals-table .thead,
  .signals-table .trow {
    grid-template-columns: 1.6fr 0.9fr 1.1fr 0.8fr 0.9fr 0.8fr 1.2fr 1.6fr;
  }
  .signals-scroll-wrapper {
    max-height: 560px;
    overflow-y: auto;
    padding-right: 4px;
  }
  .signals-scroll-wrapper::-webkit-scrollbar { width: 6px; }
  .signals-scroll-wrapper::-webkit-scrollbar-track { background: transparent; }
  .signals-scroll-wrapper::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 3px; }
  .signals-scroll-wrapper::-webkit-scrollbar-thumb:hover { background: var(--line); }
  .edge-bar-wrap { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }
  .edge-bar-track { width: 46px; height: 5px; background: var(--panel-3); border-radius: 3px; overflow: hidden; flex-shrink: 0; }
  .edge-bar-fill { height: 100%; border-radius: 3px; background: var(--signal); }
  .gate-pill {
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.02em;
    padding: 3px 8px;
    border-radius: 999px;
    display: inline-block;
    white-space: nowrap;
  }
  .gate-pill.gate-pos     { background: var(--pos-soft); color: var(--positive); }
  .gate-pill.gate-neutral { background: var(--panel-3);  color: var(--text-soft); }
  .gate-pill.gate-dim     { background: var(--panel-2);  color: var(--muted); }

  /* outcome breakdown bar */
  .outcome-panel { margin: 14px 0 16px; }
  .outcome-title {
    font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--muted); font-weight: 600; margin-bottom: 10px;
  }
  .outcome-bar {
    display: flex; height: 26px; border-radius: 6px; overflow: hidden;
    border: 1px solid var(--line); background: var(--panel-3);
  }
  .outcome-seg {
    height: 100%; display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace; font-size: 10.5px; font-weight: 600;
    color: var(--bg); white-space: nowrap; overflow: hidden; cursor: pointer;
    transition: filter 0.12s ease, opacity 0.12s ease;
  }
  .outcome-seg:hover { filter: brightness(1.15); }
  .outcome-seg.tone-pos     { background: var(--positive); }
  .outcome-seg.tone-neutral { background: var(--text-soft); }
  .outcome-seg.tone-dim     { background: var(--dim); color: var(--text-soft); }
  .outcome-bar:has(.outcome-seg.active) .outcome-seg:not(.active) { opacity: 0.35; }
  .outcome-legend { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 10px; }
  .outcome-legend-item {
    display: flex; align-items: center; gap: 6px; font-size: 12px;
    color: var(--text-soft); cursor: pointer; user-select: none;
  }
  .outcome-legend-item.disabled { opacity: 0.35; }
  .outcome-swatch { width: 9px; height: 9px; border-radius: 2.5px; flex-shrink: 0; display: inline-block; }
  .outcome-swatch.tone-pos     { background: var(--positive); }
  .outcome-swatch.tone-neutral { background: var(--text-soft); }
  .outcome-swatch.tone-dim     { background: var(--dim); }

  /* signals search controls */
  .signals-controls {
    display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
  }
  .signals-search {
    background: var(--panel-2); border: 1px solid var(--line-3); border-radius: 7px;
    padding: 7px 11px; font-family: 'Manrope', sans-serif; font-size: 13px;
    color: var(--text); width: 220px; outline: none;
  }
  .signals-search:focus { border-color: var(--signal); box-shadow: 0 0 0 3px var(--signal-soft); }
  .signals-search::placeholder { color: var(--dim); }
  .signals-controls .result-count { margin-left: auto; font-size: 12px; }

  /* expandable row detail */
  .trow.clickable { cursor: pointer; }
  .trow.expanded { background: rgba(255,255,255,0.02); }
  .detail-row {
    background: var(--panel-2);
    border-bottom: 1px solid var(--line-2);
    padding: 16px 20px 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
  }
  .detail-block h4 {
    font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.07em;
    color: var(--muted); margin: 0 0 8px; font-weight: 600;
  }
  .model-grid { display: flex; flex-direction: column; gap: 4px; }
  .model-row { display: flex; justify-content: space-between; font-size: 12px; }
  .kv-grid { display: flex; flex-direction: column; gap: 5px; font-size: 12px; }
  .kv-row { display: flex; justify-content: space-between; gap: 12px; }
  .reason-full { font-size: 12.5px; color: var(--text-soft); line-height: 1.55; }

  /* ============ SCAN FEED ============ */
  .scan-feed .chev {
    color: var(--muted);
    font-size: 14px;
    margin-left: 8px;
    user-select: none;
  }
  .scan-body { display: flex; flex-direction: column; gap: 14px; padding-top: 4px; }

  .scan-funnel {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    background: var(--panel-2);
    border-radius: 6px;
    border: 1px solid var(--line-2);
    overflow: hidden;
  }
  .funnel-step {
    padding: 14px 16px;
    border-right: 1px solid var(--line-2);
  }
  .funnel-step:last-child { border-right: 0; }
  .funnel-val {
    font-size: 20px;
    font-weight: 600;
    margin-top: 4px;
    line-height: 1.1;
  }
  .funnel-val.tone-dim { color: var(--text-soft); }
  .funnel-val.tone-neutral { color: var(--text); }
  .funnel-val.tone-signal { color: var(--signal); }
  .funnel-val.tone-pos { color: var(--positive); }
  .funnel-conv {
    margin-top: 6px;
    font-size: 10.5px;
    color: var(--muted);
    min-height: 14px;
    white-space: nowrap;
  }

  .scan-grid {
    display: grid;
    grid-template-columns: 1fr 1.1fr;
    gap: 18px;
  }
  .scan-col {}
  .col-head {
    display: flex; justify-content: space-between; align-items: baseline;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--line-2);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
  }

  .skip-bars { list-style: none; padding: 8px 0 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
  .skip-bars li { display: grid; grid-template-rows: auto auto; gap: 4px; }
  .skip-label { font-size: 12px; color: var(--text-soft); }
  .skip-row { display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: center; }
  .skip-bar {
    height: 6px;
    background: var(--panel-3);
    border-radius: 3px;
    overflow: hidden;
  }
  .skip-fill {
    height: 100%;
    background: linear-gradient(90deg, rgba(245,177,60,0.4), rgba(245,177,60,0.7));
    border-radius: 3px;
  }

  .recent-skips { list-style: none; padding: 8px 0 0; margin: 0; display: flex; flex-direction: column; gap: 0; }
  .recent-skips li {
    display: grid;
    grid-template-columns: 50px 110px 100px 1fr;
    gap: 12px;
    align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid var(--line-2);
    font-size: 12.5px;
  }
  .recent-skips li:last-child { border-bottom: 0; }
  .ts-dim { color: var(--muted); font-size: 11px; }
  .rs-city { color: var(--text); font-weight: 500; }
  .rs-bucket { font-size: 11.5px; }
  .rs-reason { color: var(--text-soft); }

  /* ============ SEG (segmented switch) ============ */
  .seg {
    display: inline-flex;
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 2px;
    gap: 0;
  }
  .seg button {
    background: transparent;
    border: 0;
    color: var(--muted);
    font: inherit;
    font-size: 11.5px;
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
  }
  .seg button:hover { color: var(--text-soft); }
  .seg button.on { background: var(--panel-3); color: var(--text); }

  /* ============ LOADING ============ */
  .loading-screen {
    display: grid;
    place-items: center;
    height: 100vh;
    color: var(--muted);
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    gap: 12px;
    flex-direction: column;
  }
  .loading-screen span { display: block; text-align: center; }

  /* ============ FOOTER ============ */
  .page-foot {
    display: flex; justify-content: space-between;
    padding: 16px 4px 4px;
    font-size: 11.5px;
    border-top: 1px solid var(--line-2);
    margin-top: 8px;
  }
  .page-foot .mono { font-family: 'JetBrains Mono', monospace; }

  /* ============ Responsive ============ */
  /* Wide content scrolls inside its own container — the PAGE never scrolls
     sideways. Tables keep a readable min-width and pan within their card. */
  @media (max-width: 1280px) {
    .row-main { grid-template-columns: 1fr; }
    .row-bottom { grid-template-columns: 1fr; }
    .perf-grid { grid-template-columns: repeat(3, 1fr); }
    .scan-grid { grid-template-columns: 1fr; }
    .header-strip { grid-template-columns: 1fr 1fr; }
    /* Stacked globe: without an explicit row height the canvas div (which has
       no intrinsic content) collapses to ~0 inside the fixed-height card. */
    .globe-card { height: auto; }
    .globe-body { grid-template-columns: 1fr; grid-template-rows: minmax(300px, 42vh) auto; }
    .globe-side { max-height: 300px; }
    .positions-card { height: auto; }
    .positions-scroll-wrapper { max-height: 420px; }
  }

  @media (max-width: 900px) {
    .app { padding: 14px 12px 28px; gap: 12px; }
    /* Topbar: brand + controls up top, nav on its own row (pans if cramped) */
    .topbar {
      grid-template-columns: 1fr auto;
      grid-template-areas: "brand right" "nav nav";
      gap: 10px;
    }
    .brand { grid-area: brand; }
    .top-right { grid-area: right; gap: 10px; }
    .top-nav {
      grid-area: nav;
      margin-left: 0;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .top-nav::-webkit-scrollbar { display: none; }
    .nav-item { white-space: nowrap; }

    /* Tables: pan sideways inside the card, columns stay readable */
    .positions-table, .trades-table, .signals-table {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .positions-table .thead, .positions-table .trow { min-width: 620px; }
    .trades-table .thead, .trades-table .trow { min-width: 680px; }
    .signals-table .thead, .signals-table .trow,
    .signals-table .detail-row { min-width: 760px; }
    .trades-table .detail-row { min-width: 680px; }
    /* Inner vertical scrollers must not clip the panned width */
    .positions-scroll-wrapper, .signals-scroll-wrapper { overflow-x: visible; }

    .card-head { flex-wrap: wrap; }
    .globe-legend { flex-wrap: wrap; gap: 8px 14px; }
    .scan-grid { gap: 12px; }
    .detail-row { grid-template-columns: 1fr; gap: 14px; padding: 14px 14px 16px; }
    .signals-controls { flex-wrap: wrap; }
    .signals-search { width: 100%; }
    .signals-controls .result-count { margin-left: 0; }
  }

  @media (max-width: 720px) {
    .perf-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .header-strip { grid-template-columns: 1fr 1fr; gap: 8px; }
    .scan-funnel { grid-template-columns: 1fr 1fr; }
    .funnel-step { border-bottom: 1px solid var(--line-2); }
    .recent-skips li {
      grid-template-columns: 50px 1fr auto;
      grid-template-areas: "ts city bucket" "reason reason reason";
      row-gap: 2px;
    }
    .recent-skips li .ts-dim { grid-area: ts; }
    .recent-skips li .rs-city { grid-area: city; }
    .recent-skips li .rs-bucket { grid-area: bucket; }
    .recent-skips li .rs-reason { grid-area: reason; font-size: 11.5px; }
  }

  @media (max-width: 560px) {
    .header-strip { grid-template-columns: 1fr; }
    .kpi { min-height: 0; padding: 13px 14px; }
    .kpi-value { font-size: 21px; }
    .card { padding: 13px 12px 12px; }
    .brand-tag { display: none; }
    .last-scan .dim { display: none; }   /* keep "12m ago" + pulse, drop label */
    .archive-banner { margin: 8px 0 0; font-size: 11px; letter-spacing: 0.04em; }
    .globe-body { grid-template-rows: minmax(260px, 38vh) auto; }
    .perf-val { font-size: 17px; }
    .perf-tile { padding: 11px 12px; }
    .funnel-step { padding: 11px 12px; }
    .funnel-val { font-size: 17px; }
    .equity-stat { text-align: left; }
    .page-foot { flex-wrap: wrap; gap: 6px; }
    /* Notification popup becomes a full-width sheet under the topbar */
    .notif-popup {
      position: fixed;
      left: 10px; right: 10px; top: 64px;
      width: auto;
      max-height: 62vh;
    }
  }

  /* Touch devices: comfortable hit targets regardless of screen width */
  @media (pointer: coarse) {
    .nav-item { padding: 10px 14px; }
    .mode-pill { padding: 8px 12px; }
    .pg-btn { width: 34px; height: 34px; font-size: 16px; }
    .notif-bell, .user-avatar { width: 36px; height: 36px; }
    .period-tab { padding: 7px 12px; }
    .city-row { padding: 10px 8px; }
    .seg button { padding: 8px 12px; }
    .outcome-legend-item { padding: 4px 0; }
  }

  /* ---- Notification bell + popup ---- */
  .notif { position: relative; }
  .notif-bell {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--panel-3);
    border: 1px solid var(--line);
    color: var(--text);
    display: grid; place-items: center;
    font-size: 13px;
    cursor: pointer;
    padding: 0;
  }
  .notif-bell:hover { border-color: var(--line-3); }
  .notif-badge {
    position: absolute;
    top: -4px; right: -4px;
    min-width: 16px; height: 16px;
    padding: 0 4px;
    border-radius: 8px;
    background: var(--negative);
    color: #fff;
    font-size: 9.5px;
    font-weight: 700;
    line-height: 16px;
    text-align: center;
    box-shadow: 0 0 0 2px var(--bg);
  }
  .notif-popup {
    position: absolute;
    top: 38px; right: 0;
    width: 340px;
    max-height: 420px;
    display: flex; flex-direction: column;
    background: var(--panel-2);
    border: 1px solid var(--line-3);
    border-radius: 8px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.55);
    z-index: 100;
    overflow: hidden;
  }
  .notif-popup-head {
    display: flex; justify-content: space-between;
    padding: 10px 12px;
    font-size: 12px; font-weight: 700;
    color: var(--text);
    border-bottom: 1px solid var(--line);
  }
  .notif-list { overflow-y: auto; }
  .notif-empty {
    padding: 24px 12px;
    text-align: center;
    color: var(--dim);
    font-size: 12px;
  }
  .notif-item {
    display: flex; gap: 9px;
    padding: 9px 12px;
    border-bottom: 1px solid var(--line-2);
    border-left: 2px solid transparent;
  }
  .notif-item:last-child { border-bottom: none; }
  .notif-error   { border-left-color: var(--negative); }
  .notif-warning { border-left-color: var(--warn); }
  .notif-info    { border-left-color: var(--signal); }
  .notif-item-icon { font-size: 12px; line-height: 1.3; }
  .notif-item-body { flex: 1; min-width: 0; }
  .notif-item-msg {
    font-size: 11.5px;
    color: var(--text-soft);
    line-height: 1.35;
    word-break: break-word;
  }
  .notif-item-meta {
    font-size: 10px;
    color: var(--dim);
    margin-top: 3px;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="/globe.js"></script>
<script type="text/babel" src="/dashboard.jsx"></script>
</body>
