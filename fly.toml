app = "stormedge"
# arn (Stockholm): Polymarket GEOBLOCKS order placement from the UK (and US, DE,
# FR, SG, AU, BR, most of CA) — reads work anywhere, so paper mode never noticed.
# Sweden is fully unrestricted. Do not move this app to a region without checking
# https://docs.polymarket.com/developers/CLOB/geoblock first.
primary_region = "arn"

[build]
  dockerfile = "Dockerfile"

[env]
  PAPER_MODE = "true"
  DB_PATH = "/data/bot.db"
  PORT = "8080"
  STARTING_BANKROLL = "20.0"

[[mounts]]
  source = "bot_data"
  destination = "/data"

[processes]
  app = "python app.py"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  # Real liveness: /healthz checks the BOT THREAD heartbeat, not just the port.
  # Without this, a dead bot thread behind a live Flask server looks healthy
  # to Fly forever (no restart, no alert) while positions go unmonitored.
  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "2m"
    method = "GET"
    path = "/healthz"

[[vm]]
  memory = "512mb"
