app = "stormedge"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  PAPER_MODE = "true"
  DB_PATH = "/data/bot.db"
  PORT = "8080"

[[mounts]]
  source = "bot_data"
  destination = "/data"

[processes]
  app = "python app.py"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]
